<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1b2e;
    color: #e0e0e8;
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3b5e; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4b6e; }

  #container { display: flex; flex-direction: column; min-height: 100vh; padding: 12px; }

  #header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: #22233a; border-radius: 10px;
    margin-bottom: 12px; border: 1px solid #2e2f4a;
  }
  .pin-icon {
    width: 24px; height: 28px; position: relative; flex-shrink: 0;
  }
  .pin-icon::before {
    content: '';
    position: absolute; top: 0; left: 3px;
    width: 18px; height: 18px;
    background: #ff4757;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
  }
  .pin-icon::after {
    content: '';
    position: absolute; top: 4px; left: 8px;
    width: 8px; height: 8px;
    background: #1a1b2e;
    border-radius: 50%;
  }
  #header .title { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; color: #fff; }
  #header .subtitle { font-size: 11px; color: #7a7b9e; margin-left: auto; }

  #search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  #search-input {
    flex: 1; padding: 9px 14px; font-size: 13px;
    background: #22233a; border: 1px solid #2e2f4a; border-radius: 8px;
    color: #e0e0e8; outline: none; transition: border-color 0.2s;
    font-family: inherit;
  }
  #search-input:focus { border-color: #5b6abf; }
  #search-input::placeholder { color: #55567a; }
  #back-btn {
    display: none; padding: 9px 14px; font-size: 12px; font-weight: 600;
    background: #2a2b48; border: 1px solid #3a3b5e; border-radius: 8px;
    color: #a0a1c0; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  #back-btn:hover { background: #33344e; color: #fff; }

  #content { flex: 1; }

  .location-detail { display: none; }
  .location-detail.active { display: block; }

  .detail-card {
    background: #22233a; border-radius: 12px; border: 1px solid #2e2f4a;
    overflow: hidden; margin-bottom: 12px;
  }
  .detail-map-area {
    height: 200px; position: relative; overflow: hidden;
    background: #181928;
  }
  .tile-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
    width: 100%; height: 100%;
  }
  .tile-grid img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity 0.3s;
  }
  .tile-grid img.loaded { opacity: 1; }
  .tile-grid img.error { display: none; }
  .map-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,27,46,0.95));
    padding: 16px 18px 12px;
  }
  .map-overlay .loc-name {
    font-size: 22px; font-weight: 800; color: #fff;
    letter-spacing: -0.3px; margin-bottom: 4px;
  }
  .map-pin-marker {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%);
    z-index: 2;
  }
  .map-pin-marker::before {
    content: '';
    display: block; width: 24px; height: 24px;
    background: #ff4757;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 2px 8px rgba(255,71,87,0.5);
  }
  .map-pin-marker::after {
    content: '';
    position: absolute; top: 5px; left: 8px;
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 50%;
  }
  .map-attribution {
    position: absolute; bottom: 2px; right: 6px;
    font-size: 9px; color: rgba(255,255,255,0.3);
    z-index: 3;
  }
  .map-attribution a { color: rgba(255,255,255,0.4); text-decoration: none; }

  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge {

  .badge-landmark { background: #ff475720; color: #ff6b7a; }
  .badge-river { background: #1e90ff20; color: #5ab0ff; }
  .badge-mountain { background: #8b5cf620; color: #a78bfa; }

// ===== Tile Math =====
function lonToTileX(lon, zoom) {
  return Math.floor((lon + 180) / 360 * Math.pow(2, zoom));
}
function latToTileY(lat, zoom) {
  const latRad = lat * Math.PI / 180;
  return Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * Math.pow(2, zoom));
}

function getTileUrls(lat, lng, zoom) {
  const z = Math.min(Math.max(Math.round(zoom), 1), 17);
  const centerX = lonToTileX(lng, z);
  const centerY = latToTileY(lat, z);
  const tiles = [];
  for (let dy = -1; dy <= 0; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const x = centerX + dx;
      const y = centerY + dy;
      if (x >= 0 && y >= 0) {
        tiles.push('https://tile.openstreetmap.org/' + z + '/' + x + '/' + y + '.png');
      }
    }
  }
  return tiles;
}

let nonce = '';
let currentView = { type: 'browse', location: null, locations: null };

window.parent.postMessage({ type: 'PLUGIN_READY', nonce: '' }, '*');

window.addEventListener('message', function(event) {
  var msg = event.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'PLUGIN_INIT') {
    nonce = msg.nonce;
  }

  if (msg.type === 'TOOL_INVOKE') {
    handleTool(msg);
  }
});

function sendResult(callId, result) {
  window.parent.postMessage({ type: 'TOOL_RESULT', nonce: nonce, callId: callId, result: result }, '*');
}

function handleTool(msg) {
  var callId = msg.callId;
  var tool = msg.tool;
  var params = msg.params || {};

  switch (tool) {
    case 'show_location': {
      var loc = findLocation(params.query);
      if (loc) {
        showLocation(loc.key, loc.data, params.zoom);
        sendResult(callId, { success: true, location: loc.key, lat: loc.data.lat, lng: loc.data.lng });
      } else {
        sendResult(callId, { success: false, error: 'Location "' + params.query + '" not found in database' });
      }
      break;
    }
    case 'show_region': {
      var loc2 = findLocation(params.region);
      if (loc2) {
        showLocation(loc2.key, loc2.data);
        sendResult(callId, { success: true, region: loc2.key });
      } else {
        sendResult(callId, { success: false, error: 'Region "' + params.region + '" not found' });
      }
      break;
    }
    case 'compare_locations': {
      var l1 = findLocation(params.location1);
      var l2 = findLocation(params.location2);
      if (l1 && l2) {
        showCompare(l1, l2);
        sendResult(callId, { success: true, location1: l1.key, location2: l2.key });
      } else {
        var missing = [];
        if (!l1) missing.push(params.location1);
        if (!l2) missing.push(params.location2);
        sendResult(callId, { success: false, error: 'Could not find: ' + missing.join(', ') });
      }
      break;
    }
    case 'get_current_view': {
      sendResult(callId, currentView);
      break;
    }
    case 'finish': {
      sendResult(callId, { success: true });
      break;
    }
    default:
      sendResult(callId, { error: 'Unknown tool: ' + tool });
  }
}

// ===== Location Lookup =====
function findLocation(query) {
  if (!query) return null;
  var q = query.toLowerCase().trim();

  if (LOCATIONS[q]) return { key: q, data: LOCATIONS[q] };

  for (var key in LOCATIONS) {
    if (key.indexOf(q) !== -1 || q.indexOf(key) !== -1) return { key: key, data: LOCATIONS[key] };
  }

  var words = q.split(/\s+/);
  for (var key2 in LOCATIONS) {
    var keyWords = key2.split(/\s+/);
    for (var i = 0; i < words.length; i++) {
      for (var j = 0; j < keyWords.length; j++) {
        if (words[i].length >= 3 && keyWords[j].indexOf(words[i]) === 0) {
          return { key: key2, data: LOCATIONS[key2] };
        }
      }
    }
  }

  return null;
}

// ===== Display Functions =====
function formatName(key) {
  return key.replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function continentKey(continent) {
  var map = {
    'Africa': 'africa', 'Asia': 'asia', 'Europe': 'europe',
    'North America': 'namerica', 'South America': 'samerica',
    'Oceania': 'oceania', 'Antarctica': 'antarctica', 'Arctic': 'arctic'
  };
  return map[continent] || 'region';
}

function buildMapArea(data, name) {
  var tiles = getTileUrls(data.lat, data.lng, data.zoom || 10);
  var tileImgs = '';
  for (var i = 0; i < tiles.length; i++) {
    tileImgs += '<img src="' + tiles[i] + '" onload="this.classList.add(\'loaded\')" onerror="this.classList.add(\'error\')" alt="" crossorigin="anonymous" referrerpolicy="no-referrer" />';
  }

  return '<div class="detail-map-area">' +
    '<div class="tile-grid">' + tileImgs + '</div>' +
    '<div class="map-pin-marker"></div>' +
    '<div class="map-overlay"><div class="loc-name">' + name + '</div></div>' +
    '<div class="map-attribution">&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a></div>' +
    '</div>';
}

function buildDetailBody(data) {
  var latDir = data.lat >= 0 ? 'N' : 'S';
  var lngDir = data.lng >= 0 ? 'E' : 'W';
  return '<div class="detail-body">' +
    '<div class="badge-row">' +
      '<span class="badge badge-' + data.category + '">' + data.category + '</span>' +
      '<span class="badge badge-' + continentKey(data.continent) + '">' + data.continent + '</span>' +
    '</div>' +
    '<div class="coords-line">' + Math.abs(data.lat).toFixed(4) + latDir + ', ' + Math.abs(data.lng).toFixed(4) + lngDir + '</div>' +
    '<div class="detail-info">' + data.info + '</div>' +
    '<div class="fun-fact">' +
      '<div class="fun-fact-label">Fun Fact</div>' +
      '<div class="fun-fact-text">' + data.funFact + '</div>' +
    '</div>' +
    '</div>';
}

function showLocation(key, data, overrideZoom) {
  var d = overrideZoom ? Object.assign({}, data, { zoom: overrideZoom }) : data;
  var name = formatName(key);

  document.getElementById('detail-view').innerHTML =
    '<div class="detail-card">' + buildMapArea(d, name) + buildDetailBody(d) + '</div>';
  document.getElementById('detail-view').classList.add('active');
  document.getElementById('compare-view').classList.remove('active');
  document.getElementById('compare-view').innerHTML = '';
  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-status').textContent = name;

  currentView = { type: 'location', location: key, lat: data.lat, lng: data.lng };
  window.scrollTo(0, 0);
}

function showCompare(loc1, loc2) {
  var name1 = formatName(loc1.key);
  var name2 = formatName(loc2.key);

  document.getElementById('compare-view').innerHTML =
    '<div class="detail-card">' + buildMapArea(loc1.data, name1) + buildDetailBody(loc1.data) + '</div>' +
    '<div class="detail-card">' + buildMapArea(loc2.data, name2) + buildDetailBody(loc2.data) + '</div>';
  document.getElementById('compare-view').classList.add('active');
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('detail-view').innerHTML = '';
  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-status').textContent = name1 + ' vs ' + name2;

  currentView = { type: 'compare', locations: [loc1.key, loc2.key] };
  window.scrollTo(0, 0);
}

function showBrowse(filter) {
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('detail-view').innerHTML = '';
  document.getElementById('compare-view').classList.remove('active');
  document.getElementById('compare-view').innerHTML = '';
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-status').textContent = '30 locations';

  var groups = {};
  var continentOrder = ['Europe', 'Asia', 'North America', 'South America', 'Africa', 'Oceania', 'Antarctica', 'Arctic'];

  for (var key in LOCATIONS) {
    var data = LOCATIONS[key];
    var name = formatName(key);
    if (filter && name.toLowerCase().indexOf(filter) === -1 && data.category.indexOf(filter) === -1 && data.continent.toLowerCase().indexOf(filter) === -1) {
      continue;
    }
    if (!groups[data.continent]) groups[data.continent] = [];
    groups[data.continent].push({ key: key, data: data, name: name });
  }

  var html = '';
  var totalShown = 0;

  for (var ci = 0; ci < continentOrder.length; ci++) {
    var continent = continentOrder[ci];
    if (!groups[continent] || groups[continent].length === 0) continue;
    groups[continent].sort(function(a, b) { return a.name.localeCompare(b.name); });
    totalShown += groups[continent].length;
    html += '<div class="continent-section">';
    html += '<div class="continent-label">' + continent + '</div>';
    html += '<div class="loc-grid">';
    for (var li = 0; li < groups[continent].length; li++) {
      var loc = groups[continent][li];
      html += '<div class="loc-card" data-cat="' + loc.data.category + '" data-key="' + loc.key + '">' +
        '<div class="loc-card-name">' + loc.name + '</div>' +
        '<div class="loc-card-cat">' + loc.data.category + '</div>' +
        '</div>';
    }
    html += '</div></div>';
  }

  if (totalShown === 0) {
    html = '<div class="no-results">No locations match "' + filter + '"</div>';
  }

  if (filter) {
    document.getElementById('header-status').textContent = totalShown + ' result' + (totalShown !== 1 ? 's' : '');
  }

  document.getElementById('browse-view').innerHTML = html;
  currentView = { type: 'browse', location: null };

  var cards = document.querySelectorAll('.loc-card');
  for (var ci2 = 0; ci2 < cards.length; ci2++) {
    cards[ci2].addEventListener('click', function() {
      var k = this.dataset.key;
      if (LOCATIONS[k]) {
        showLocation(k, LOCATIONS[k]);
        document.getElementById('search-input').value = '';
      }
    });
  }
}

// ===== Event Listeners =====
document.getElementById('search-input').addEventListener('input', function(e) {
  var val = e.target.value.toLowerCase().trim();
  showBrowse(val || '');
});

document.getElementById('back-btn').addEventListener('click', function() {
  document.getElementById('search-input').value = '';
  showBrowse('');
});

// ===== Init =====
showBrowse('');
</script>
</body>
</html>
