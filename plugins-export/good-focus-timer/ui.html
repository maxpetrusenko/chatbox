<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Timer Lite</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --panel: #182028;
        --text: #f4f7fb;
        --muted: #99a6b5;
        --accent: #4fd1a5;
        --accent-strong: #2fbf90;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1e2935 0%, var(--bg) 60%);
        color: var(--text);
      }
      .card {
        width: min(92vw, 420px);
        padding: 24px;
        border-radius: 20px;
        background: rgba(24, 32, 40, 0.95);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 18px; color: var(--muted); }
      .time { font-size: 56px; font-weight: 700; letter-spacing: -0.04em; margin: 12px 0 20px; }
      .row { display: flex; gap: 12px; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        cursor: pointer;
      }
      .primary { background: var(--accent); color: #092018; }
      .primary:hover { background: var(--accent-strong); }
      .secondary { background: #27313c; color: var(--text); }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Focus Timer Lite</h1>
      <p>Safe local timer. No auth. No network. No student data.</p>
      <div class="time" id="time">25:00</div>
      <div class="row">
        <button class="primary" id="start">Start</button>
        <button class="secondary" id="reset">Reset</button>
      </div>
    </section>

    <script>
      const timeEl = document.getElementById('time');
      const startBtn = document.getElementById('start');
      const resetBtn = document.getElementById('reset');

      let remaining = 25 * 60;
      let timer = null;

      function render() {
        const minutes = String(Math.floor(remaining / 60)).padStart(2, '0');
        const seconds = String(remaining % 60).padStart(2, '0');
        timeEl.textContent = `${minutes}:${seconds}`;
      }

      startBtn.addEventListener('click', () => {
        if (timer) return;
        timer = window.setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          render();
          if (remaining === 0) {
            window.clearInterval(timer);
            timer = null;
          }
        }, 1000);
      });

      resetBtn.addEventListener('click', () => {
        if (timer) {
          window.clearInterval(timer);
          timer = null;
        }
        remaining = 25 * 60;
        render();
      });

      render();
      window.parent.postMessage({ type: 'PLUGIN_READY', nonce: '' }, '*');
    </script>
  </body>
</html>
